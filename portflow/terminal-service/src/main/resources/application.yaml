spring:
  application:
    name: terminal-service

  mongodb:
    uri: mongodb://terminal_service:terminal_service@localhost:27017/terminal_service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8082
